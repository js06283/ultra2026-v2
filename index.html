<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>ULTRA</title>
		<link rel="stylesheet" href="styles.css" />
		<link
			href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;800&family=Rajdhani:wght@400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		<!-- Railway DB service -->
		<script src="railway-db-service.js"></script>
		<!-- CSV Parser and Schedule Loader -->
		<script src="csv-parser.js"></script>
		<script src="load-schedule.js"></script>
	</head>
	<body>
		<div class="container">
			<header class="header">
				<h1>ULTRA</h1>
				<p class="interaction-hint">
					1 click = interested, 2 clicks = must see, 3 clicks = delete
				</p>
				<div class="name-input-section">
					<select id="nameSelect" class="name-select">
						<option value="">Select a name...</option>
						<option value="Jess">Jess</option>
						<option value="Theo">Theo</option>
						<option value="Andy">Andy</option>
						<option value="Noel">Noel</option>
						<option value="Kevin">Kevin</option>
						<option value="Ellen">Ellen</option>
						<option value="Cindy">Cindy</option>
						<option value="PJ">PJ</option>
						<option value="custom">Other (enter custom name)</option>
					</select>
					<input
						type="text"
						id="nameInput"
						placeholder="Enter custom name..."
						maxlength="50"
						style="display: none"
					/>
					<button id="addNameBtn" class="btn-primary">Add Name</button>
				</div>
				<div class="view-controls">
					<div class="day-toggles">
						<button class="day-toggle active" data-day="all">All Days</button>
						<button class="day-toggle" data-day="friday">Friday</button>
						<button class="day-toggle" data-day="saturday">Saturday</button>
						<button class="day-toggle" data-day="sunday">Sunday</button>
					</div>
					<div class="schedule-mode-control">
						<label for="scheduleModeSelect">Schedule</label>
						<select id="scheduleModeSelect" class="schedule-mode-select">
							<option value="all">All Shows</option>
							<option value="my">My Schedule</option>
							<option value="group">Group Schedule</option>
						</select>
					</div>
					<div class="view-toggles">
						<button id="chronologicalToggle" class="btn-secondary">
							Chronological
						</button>
						<button id="timelineToggle" class="btn-secondary">Timeline</button>
					</div>
				</div>
			</header>

			<div class="festival-grid">
				<!-- Loading placeholder - will be replaced by real schedule -->
				<div class="loading-placeholder">
					<div class="loading-spinner"></div>
					<p>Loading ULTRA festival schedule...</p>
				</div>
			</div>
		</div>

		<script src="script.js"></script>
	</body>
</html>
